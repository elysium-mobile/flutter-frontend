name: Flutter Multiplatform CI/CD - Firebase Distribution

on:
  push:
    branches:
      - master

jobs:
  # ----------------------------------------------------------------
  # ANDROID: COMPILATION AND DEPLOYMENT
  # ----------------------------------------------------------------
  android-build-distribute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        id: setup-java
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.path }}
        run: |
          flutter build apk --debug \
            --dart-define=API_BASE_URL="https://api.softwork.elysium.example/" \
            --dart-define=FIREBASE_API_KEY="${{ secrets.FIREBASE_API_KEY }}" \
            --dart-define=FIREBASE_APP_ID="${{ secrets.FIREBASE_APP_ID }}" \
            --dart-define=FIREBASE_PROJECT_ID="${{ secrets.FIREBASE_PROJECT_ID }}" \
            --dart-define=GOOGLE_SERVER_CLIENT_ID="${{ secrets.GOOGLE_SERVER_CLIENT_ID }}"

      - name: Upload to Firebase App Distribution (Android)
        uses: w9jds/firebase-action@v2.2.2
        with:
          args: appdistribution:distribute build/app/outputs/flutter-apk/app-debug.apk --app ${{ secrets.FIREBASE_APP_ID }} --groups "testers-android-ios"
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_CREDENTIALS }}

  # ----------------------------------------------------------------
  # IOS: COMPILATION AND DEPLOYMENT
  # ----------------------------------------------------------------
  ios-build-distribute:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS IPA
        run: |
          flutter build ipa --debug \
            --dart-define=API_BASE_URL="https://api.softwork.elysium.example/" \
            --dart-define=FIREBASE_API_KEY="${{ secrets.FIREBASE_API_KEY }}" \
            --dart-define=FIREBASE_APP_ID="${{ secrets.FIREBASE_IOS_APP_ID }}" \
            --dart-define=FIREBASE_PROJECT_ID="${{ secrets.FIREBASE_PROJECT_ID }}" \
            --dart-define=GOOGLE_SERVER_CLIENT_ID="${{ secrets.GOOGLE_SERVER_CLIENT_ID }}" \
            --no-codesign

      - name: Upload to Firebase App Distribution (iOS)
        uses: w9jds/firebase-action@v2.2.2
        with:
          args: appdistribution:distribute build/ios/ipa/*.ipa --app ${{ secrets.FIREBASE_IOS_APP_ID }} --groups "testers-android-ios"
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_CREDENTIALS }}
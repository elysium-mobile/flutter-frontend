name: Flutter Multiplatform CI/CD - Firebase Distribution

on:
  push:
    branches:
      - master

jobs:
  # ----------------------------------------------------------------
  # ANDROID: COMPILATION AND DEPLOYMENT
  # ----------------------------------------------------------------
  android-build-distribute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        id: setup-java
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create google-services.json
        run: |
          cat <<EOF > android/app/google-services.json
          {
            "project_info": {
              "project_number": "301176068632",
              "project_id": "${{ secrets.FIREBASE_PROJECT_ID }}",
              "storage_bucket": "${{ secrets.FIREBASE_PROJECT_ID }}.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "${{ secrets.FIREBASE_APP_ID }}",
                  "android_client_info": {
                    "package_name": "com.elysium.softwork"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "${{ secrets.FIREBASE_API_KEY }}"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Build Android APK
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.path }}
        run: |
          flutter build apk --debug \
            --dart-define=API_BASE_URL="https://api.softwork.elysium.example/" \
            --dart-define=FIREBASE_API_KEY="${{ secrets.FIREBASE_API_KEY }}" \
            --dart-define=FIREBASE_APP_ID="${{ secrets.FIREBASE_APP_ID }}" \
            --dart-define=FIREBASE_PROJECT_ID="${{ secrets.FIREBASE_PROJECT_ID }}" \
            --dart-define=GOOGLE_SERVER_CLIENT_ID="${{ secrets.GOOGLE_SERVER_CLIENT_ID }}"

      - name: Upload to Firebase App Distribution (Android)
        uses: w9jds/firebase-action@v2.2.2
        with:
          args: appdistribution:distribute build/app/outputs/flutter-apk/app-debug.apk --app ${{ secrets.FIREBASE_APP_ID }} --groups "testers-android-ios"
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_CREDENTIALS }}

  # ----------------------------------------------------------------
  # IOS: COMPILATION AND DEPLOYMENT
  # ----------------------------------------------------------------
  ios-build-distribute:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create GoogleService-Info.plist
        run: |
          cat <<EOF > ios/Runner/GoogleService-Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>API_KEY</key>
            <string>${{ secrets.FIREBASE_API_KEY }}</string>
            <key>APP_ID</key>
            <string>${{ secrets.FIREBASE_IOS_APP_ID }}</string>
            <key>PROJECT_ID</key>
            <string>${{ secrets.FIREBASE_PROJECT_ID }}</string>
            <key>GCM_SENDER_ID</key>
            <string>301176068632</string>
            <key>IS_ADS_ENABLED</key>
            <false/>
            <key>IS_ANALYTICS_ENABLED</key>
            <false/>
            <key>IS_APPINVITE_ENABLED</key>
            <false/>
            <key>IS_GCM_ENABLED</key>
            <true/>
            <key>IS_SIGNIN_ENABLED</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Install dependencies
        run: |
          flutter pub get --no-example
        env:
          FLUTTER_SUPPRESS_ANALYTICS: true

      - name: Initialize iOS configuration and Pods
        run: |
          cd ios
          pod repo update
          pod install
          cd ..
          flutter build ios --config-only

      - name: Build iOS IPA
        run: |
          flutter build ipa --debug \
            --dart-define=API_BASE_URL="https://api.softwork.elysium.example/" \
            --dart-define=FIREBASE_API_KEY="${{ secrets.FIREBASE_API_KEY }}" \
            --dart-define=FIREBASE_APP_ID="${{ secrets.FIREBASE_IOS_APP_ID }}" \
            --dart-define=FIREBASE_PROJECT_ID="${{ secrets.FIREBASE_PROJECT_ID }}" \
            --dart-define=GOOGLE_SERVER_CLIENT_ID="${{ secrets.GOOGLE_SERVER_CLIENT_ID }}" \
            --no-codesign

      - name: Upload to Firebase App Distribution (iOS)
        uses: w9jds/firebase-action@v2.2.2
        with:
          args: appdistribution:distribute build/ios/ipa/*.ipa --app ${{ secrets.FIREBASE_IOS_APP_ID }} --groups "testers-android-ios"
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_CREDENTIALS }}
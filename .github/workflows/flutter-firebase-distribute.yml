name: Flutter Multiplatform CI/CD - Firebase Distribution

on:
  push:
    branches:
      - master

jobs:
  # ----------------------------------------------------------------
  # ANDROID
  # ----------------------------------------------------------------
  android-build-distribute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        id: setup-java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Doctor
        run: |
          flutter --version
          flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Create google-services.json
        run: |
          cat <<EOF > android/app/google-services.json
          {
            "project_info": {
              "project_number": "301176068632",
              "project_id": "${{ secrets.FIREBASE_PROJECT_ID }}",
              "storage_bucket": "${{ secrets.FIREBASE_PROJECT_ID }}.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "${{ secrets.FIREBASE_APP_ID }}",
                  "android_client_info": {
                    "package_name": "com.elysium.softwork"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "${{ secrets.FIREBASE_API_KEY }}"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Build Android APK
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.path }}
        run: |
          flutter build apk --debug \
            --dart-define=API_BASE_URL=https://api.softwork.elysium.example/ \
            --dart-define=FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }} \
            --dart-define=FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }} \
            --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }} \
            --dart-define=GOOGLE_SERVER_CLIENT_ID=${{ secrets.GOOGLE_SERVER_CLIENT_ID }}

      - name: Upload Android to Firebase App Distribution
        uses: w9jds/firebase-action@v2.2.2
        with:
          args: >
            appdistribution:distribute
            build/app/outputs/flutter-apk/app-debug.apk
            --app ${{ secrets.FIREBASE_APP_ID }}
            --groups testers-android
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_CREDENTIALS }}

  # ----------------------------------------------------------------
  # IOS
  # ----------------------------------------------------------------
  ios-build-distribute:
    runs-on: macos-15

    env:
      BUNDLE_ID: com.elysium.softwork

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          cache: true

      - name: Flutter Doctor
        run: |
          flutter --version
          flutter doctor -v

      - name: Clean
        run: |
          flutter clean
          rm -rf build .dart_tool

      - name: Restore Firebase plist
        run: |
          cat <<EOF > ios/Runner/GoogleService-Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>API_KEY</key>
            <string>${{ secrets.FIREBASE_API_KEY }}</string>
            <key>GOOGLE_APP_ID</key>
            <string>${{ secrets.FIREBASE_IOS_APP_ID }}</string>
            <key>PROJECT_ID</key>
            <string>${{ secrets.FIREBASE_PROJECT_ID }}</string>
            <key>GCM_SENDER_ID</key>
            <string>301176068632</string>
          </dict>
          </plist>
          EOF

      - name: Flutter Pub Get
        run: flutter pub get -v

      # --- Code signing setup (the missing piece) ---
      - name: Import signing certificate & provisioning profile
        env:
          CERT_B64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          PROFILE_B64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$CERT_B64"    | base64 --decode > "$CERT_PATH"
          echo "$PROFILE_B64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Install the provisioning profile
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          UUID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          echo "Installed provisioning profile $UUID"

      - name: Create ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat <<EOF > ios/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Generate iOS Config
        run: flutter build ios --config-only

      - name: Build signed iOS IPA
        run: |
          flutter build ipa \
            --release \
            --export-options-plist=ios/ExportOptions.plist \
            --dart-define=API_BASE_URL=https://api.softwork.elysium.example/ \
            --dart-define=FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }} \
            --dart-define=FIREBASE_APP_ID=${{ secrets.FIREBASE_IOS_APP_ID }} \
            --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }} \
            --dart-define=GOOGLE_SERVER_CLIENT_ID=${{ secrets.GOOGLE_SERVER_CLIENT_ID }}

      - name: Check IPA
        run: |
          echo "Listing exported IPAs:"
          ls -la build/ios/ipa || true
          find build -name "*.ipa" -type f

      - name: Create Firebase credentials file
        run: echo '${{ secrets.FIREBASE_CREDENTIALS }}' > "$RUNNER_TEMP/firebase-key.json"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Upload iOS to Firebase App Distribution
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-key.json
        run: |
          set -euo pipefail
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found"
            exit 1
          fi
          echo "Uploading $IPA_PATH"
          firebase appdistribution:distribute \
            "$IPA_PATH" \
            --app "${{ secrets.FIREBASE_IOS_APP_ID }}" \
            --groups "testers-ios"